server:
  port: 891
  servlet:
    context-path: /${spring.application.name}

spring:
  application:
    name: cad-integration

springdoc:
  swagger-ui:
    path: /api

# 日志配置
logging:
  level:
    root: INFO
    io.emop.cad: DEBUG
    io.emop.example.cad: DEBUG
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss} [%thread] %-5level %logger{36} - %msg%n"

EMOP_DOMAIN: dev.emop.emopdata.com
